name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: asdf-vm/actions/setup@v2
      
      - name: Test plugin installation
        run: |
          asdf plugin test dotenv . dotenv version
      
      - name: Test listing versions
        run: |
          asdf plugin add dotenv .
          asdf list all dotenv | head -10